apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins-admin-sa
  namespace: jenkins-admin
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jenkins-admin-binding
subjects:
  - kind: ServiceAccount
    name: jenkins-admin-sa
    namespace: jenkins-admin
roleRef:
  kind: ClusterRole
  name: cluster-admin # Permisos de admin para facilitar el despliegue de recursos
  apiGroup: rbac.authorization.k8s.io