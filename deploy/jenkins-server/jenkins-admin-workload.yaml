apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins-admin
  namespace: jenkins-admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins-admin
  template:
    metadata:
      labels:
        app: jenkins-admin
    spec:
      serviceAccountName: jenkins-admin-sa
      containers:
        - name: jenkins
          image: jenkins/jenkins:lts
          ports:
            - containerPort: 8080
            - containerPort: 50000
          volumeMounts:
            - name: jenkins-admin-data
              mountPath: /var/jenkins_home
      volumes:
        - name: jenkins-admin-data
          persistentVolumeClaim:
            claimName: jenkins-admin-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: jenkins-admin-service
  namespace: jenkins-admin
spec:
  type: NodePort
  selector:
    app: jenkins-admin
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 32001 # Acceso externo por este puerto
    - name: jnlp
      port: 50000
      targetPort: 50000